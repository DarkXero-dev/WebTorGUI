name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux (deb + rpm)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            libdbus-1-dev \
            mpv \
            pkg-config

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Install packaging tools
        run: |
          cargo install cargo-packager --locked
          cargo install cargo-generate-rpm --locked

      - name: Build .deb package
        run: cargo packager --release --formats deb

      - name: Build .rpm package
        run: |
          strip target/release/webtorapp
          cargo generate-rpm

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: webtorapp-linux
          # cargo-packager drops the .deb straight into bundle/, not a
          # bundle/deb/ subfolder - the recursive glob also covers it if a
          # future cargo-packager version nests it after all.
          path: |
            target/release/bundle/**/*.deb
            target/generate-rpm/*.rpm

  release:
    name: Publish GitHub Release
    needs: [linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: webtorapp-linux
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-pre ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # download-artifact preserves the subfolder structure each
          # artifact was uploaded with (deb/, generate-rpm/, etc.) - `dist/*`
          # matches those directories too, and gh release create can't
          # upload a directory as an asset. Only pass actual files.
          mapfile -t ASSETS < <(find dist -type f)
          gh release create "$TAG" "${ASSETS[@]}" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE_FLAG
