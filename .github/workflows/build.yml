name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  linux:
    name: Linux (deb + rpm)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libsqlite3-dev \
            libdbus-1-dev \
            mpv \
            pkg-config

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Install packaging tools
        run: |
          cargo install cargo-packager --locked
          cargo install cargo-generate-rpm --locked

      - name: Build .deb package
        run: cargo packager --release --formats deb

      - name: Build .rpm package
        run: |
          strip target/release/webtorapp
          cargo generate-rpm

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: webtorapp-linux
          # cargo-packager drops the .deb straight into bundle/, not a
          # bundle/deb/ subfolder (same gotcha the Windows NSIS installer
          # hit) - the recursive glob also covers it if a future
          # cargo-packager version nests it after all.
          path: |
            target/release/bundle/**/*.deb
            target/generate-rpm/*.rpm

  windows:
    name: Windows (installer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      # Bundled with the app - embedded playback shells out to it via --wid.
      # sourceforge.net (mpv's usual Windows build host) sits behind a
      # Cloudflare JS challenge that a plain Invoke-WebRequest can't pass,
      # so this uses Chocolatey instead - already preinstalled on
      # windows-latest runners, and built for exactly this kind of
      # unattended CI install.
      - name: Install mpv via Chocolatey
        shell: pwsh
        run: |
          choco install mpv -y --no-progress
          # The `mpv` package is a thin wrapper - the actual binary gets
          # extracted by its `mpvio.install` dependency into a sibling
          # package folder, not lib\mpv itself. Search the whole lib tree
          # rather than hardcoding which package owns the real exe.
          $mpvExe = Get-ChildItem -Path "C:\ProgramData\chocolatey\lib" -Filter "mpv.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $mpvExe) { throw "mpv.exe not found anywhere under C:\ProgramData\chocolatey\lib after choco install" }
          Write-Host "Found mpv.exe at $($mpvExe.FullName)"
          Copy-Item $mpvExe.FullName target/release/mpv.exe

      # wry's WebView2 binding imports webview2loader.dll directly (raw-dylib) -
      # Windows resolves that import at process launch, so without a real copy
      # of this DLL next to the exe the installed app can't even start.
      # webview2-com-sys's build.rs copies it into its own OUT_DIR for linking
      # but never into target/release/, so cargo-packager never picks it up
      # unless we grab it ourselves.
      - name: Bundle WebView2Loader.dll
        shell: pwsh
        run: |
          $loader = Get-ChildItem -Path "target/release/build" -Filter "WebView2Loader.dll" -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.FullName -like "*\x64\*" } | Select-Object -First 1
          if (-not $loader) { throw "WebView2Loader.dll not found under target/release/build - did webview2-com-sys's build.rs run?" }
          Write-Host "Found WebView2Loader.dll at $($loader.FullName)"
          Copy-Item $loader.FullName target/release/WebView2Loader.dll

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build Windows installer
        run: cargo packager --release --formats nsis

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: webtorapp-windows
          # cargo-packager drops the NSIS installer straight into bundle/,
          # not a bundle/nsis/ subfolder - the recursive glob also covers
          # it if a future cargo-packager version nests it after all.
          path: target/release/bundle/**/*.exe

  windows7:
    name: Windows 7 (best-effort)
    runs-on: windows-latest
    # Mainline rustc dropped Windows 7 support (std now assumes Windows 10+
    # on x86_64-pc-windows-msvc). x86_64-win7-windows-msvc keeps targeting
    # it, but it's tier-3: no prebuilt std, nightly-only, and std has to be
    # rebuilt from source on every run via -Z build-std. This whole job is
    # unverified on real Windows 7 hardware - neither CI nor local dev has
    # any - so a failure here must never block the real Linux/Windows
    # release.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install nightly Rust with rust-src
        run: |
          rustup toolchain install nightly --component rust-src
          rustup default nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # --no-default-features drops the embedded-login feature (tao/wry/
      # WebView2) entirely - WebView2 has had no security updates on
      # Windows 7 since Jan 2023 and its installer refuses to run there
      # now. `win7` swaps in src/manual_login.rs's system-browser +
      # paste-cookie flow instead. See Cargo.toml's [features] block.
      - name: Build release binary (Win7 target)
        run: cargo build -Z build-std=std,panic_abort --target x86_64-win7-windows-msvc --release --no-default-features --features win7

      - name: Run tests (Win7 target)
        run: cargo test -Z build-std=std,panic_abort --target x86_64-win7-windows-msvc --release --no-default-features --features win7

      - name: Install mpv via Chocolatey
        shell: pwsh
        run: |
          choco install mpv -y --no-progress
          $mpvExe = Get-ChildItem -Path "C:\ProgramData\chocolatey\lib" -Filter "mpv.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $mpvExe) { throw "mpv.exe not found anywhere under C:\ProgramData\chocolatey\lib after choco install" }
          Copy-Item $mpvExe.FullName target/x86_64-win7-windows-msvc/release/mpv.exe

      # No installer for this one yet - cargo-packager/NSIS assume
      # target/release/, not a custom --target output dir, and this build
      # is best-effort until it's actually been run on real Windows 7. A
      # plain zip is enough for now; installer polish is a follow-up once
      # someone confirms the exe even launches there.
      - name: Package Win7 build
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-win7 | Out-Null
          Copy-Item target/x86_64-win7-windows-msvc/release/webtorapp.exe dist-win7/
          Copy-Item target/x86_64-win7-windows-msvc/release/mpv.exe dist-win7/
          Compress-Archive -Path dist-win7/* -DestinationPath webtorapp-windows7.zip

      - name: Upload Win7 build
        uses: actions/upload-artifact@v4
        with:
          name: webtorapp-windows7
          path: webtorapp-windows7.zip

  release:
    name: Publish GitHub Release
    needs: [linux, windows, windows7]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux packages
        uses: actions/download-artifact@v4
        with:
          name: webtorapp-linux
          path: dist

      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: webtorapp-windows
          path: dist

      # windows7 is continue-on-error and may not have produced this
      # artifact at all (e.g. build-std failed) - don't let a missing
      # best-effort artifact block shipping the real release.
      - name: Download Windows 7 build
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: webtorapp-windows7
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PRERELEASE_FLAG=""
          if [[ "$TAG" == *-pre ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # download-artifact preserves the subfolder structure each
          # artifact was uploaded with (deb/, generate-rpm/, etc.) - `dist/*`
          # matches those directories too, and gh release create can't
          # upload a directory as an asset. Only pass actual files.
          mapfile -t ASSETS < <(find dist -type f)
          gh release create "$TAG" "${ASSETS[@]}" \
            --title "$TAG" \
            --generate-notes \
            $PRERELEASE_FLAG
